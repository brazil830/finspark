# Development Docker Compose Configuration
# Start with: docker-compose up -d
# Stop with: docker-compose down

version: '3.8'

services:
  # PostgreSQL Database (Primary)
  postgres:
    image: postgres:15-alpine
    container_name: ragsec-postgres-dev
    environment:
      POSTGRES_DB: ${DB_NAME:-ragsec_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init_db.py:/docker-entrypoint-initdb.d/init_db.py:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragsec-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ragsec-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ragsec-network

  # RAG-Sec Backend Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ragsec-backend-dev
    environment:
      # Application Settings
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "true"
      LOG_LEVEL: DEBUG

      # Database Configuration
      DB_ENGINE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ragsec_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-ragsec_db}

      # SQLite Sandbox
      SQLITE_DB_PATH: /app/sandbox.db

      # Redis Configuration
      REDIS_URL: redis://redis:6379/0

      # Security Settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # Cryptography
      HSM_KEY_ROTATION_MINUTES: 5
      ENABLE_HSM_SIMULATION: "true"

      # Features
      ENABLE_HONEY_TABLE_DETECTION: "true"
      ENABLE_DECEPTION_ROUTING: "true"
      ENABLE_REQUEST_LOGGING: "true"

      # CORS
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:5173", "http://127.0.0.1:3000", "http://127.0.0.1:5173"]'
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - ragsec-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ragsec-network:
    driver: bridge
